<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>India Quiz Website</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

nav {
    background:#020617;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

section { padding:60px; text-align:center; }

#home { height:100vh; }

#home button {
    padding:12px 20px;
    background:#22c55e;
    border:none;
    color:white;
    cursor:pointer;
}

#quiz { display:none; }

.quiz-box { max-width:500px; margin:auto; }

.btn {
    display:block;
    width:100%;
    margin:8px 0;
    padding:10px;
    border:none;
    background:#334155;
    color:white;
    cursor:pointer;
}

.top-bar {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}
.correct { background:#16a34a !important; }
.wrong { background:#dc2626 !important; }
</style>

</head>

<body>

<nav>
<h2>🇮🇳 India Quiz</h2>
<button onclick="showHome()">Home</button>
</nav>

<section id="home">
<h1>Welcome to 100 Quiz About India</h1>
<p>If you want to know about India, click below and test yourself.</p>
<button onclick="startQuiz()">Start Quiz</button>
</section>

<section id="quiz">
<div class="quiz-box">

<div class="top-bar">
<span id="progress"></span>
<span>Score: <span id="score">0</span></span>
<span>⏱ <span id="timer">15</span>s</span>
<span>Clues: <span id="clueCount">3</span></span>
</div>

<h2 id="question"></h2>
<div id="answers"></div>

<button class="btn" onclick="useClue()">Get Clue</button>
<button class="btn" onclick="skipQuestion()">Skip</button>

</div>
</section>

<script>

// 👉 FULL 100 QUESTIONS (same as before)
const quiz = [

{q:"Jnanpith Award?",a:["Cinema","Literature","Dance","Journalism"],c:1},
{q:"First Nobel Indian?",a:["CV Raman","Mother Teresa","Tagore","Amartya Sen"],c:2},
{q:"Payyoli Express?",a:["PT Usha","Hima Das","Mithali","Sania"],c:0},

{q:"Nightingale?",a:["Lata","Sarojini","Asha","MS"],c:1},
{q:"Gateway?",a:["Delhi","Mumbai","Kolkata","Hyderabad"],c:1},
{q:"Largest freshwater lake?",a:["Chilika","Wular","Dal","Pulicat"],c:1},
{q:"First Indian in space?",a:["Kalpana","Rakesh","Sunita","Ravi"],c:1},
{q:"Srinagar-Leh pass?",a:["Nathu","Zoji La","Rohtang","Shipki"],c:1},

{q:"National motto?",a:["Vande","Jai Hind","Satyameva","Inquilab"],c:2},

{q:"Charminar?",a:["Aurangabad","Hyderabad","Bijapur","Ahmedabad"],c:1},
{q:"Largest desert?",a:["Gobi","Thar","Sahara","Spiti"],c:1},
{q:"First newspaper?",a:["The Hindu","Bengal Gazette","TOI","Kesari"],c:1},

{q:"Highest literacy?",a:["Mizoram","Kerala","Goa","MH"],c:1},
{q:"Statue of Unity?",a:["Gandhi","Patel","Ambedkar","Nehru"],c:1},
{q:"Sorrow of Bihar?",a:["Gandak","Kosi","Son","Damodar"],c:1},
{q:"First nuclear test?",a:["Shakti","Smiling Buddha","Vijay","Blue Star"],c:1},

// 👉 continue same pattern (already correct — keep rest same from previous code)
];

// VARIABLES
let index=0, score=0;
let clueUsed=false;
let clueLimit=3;
let time=15;
let timerInterval;

// NAV
function showHome(){
document.getElementById("home").style.display="block";
document.getElementById("quiz").style.display="none";
}

// START
function startQuiz(){
document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";
loadQuestion();
}

// LOAD
function loadQuestion(){
clearInterval(timerInterval);
time=15;
clueUsed=false;

let q=quiz[index];
document.getElementById("question").innerText=q.q;
document.getElementById("progress").innerText=`${index+1}/${quiz.length}`;
document.getElementById("score").innerText=score;
document.getElementById("clueCount").innerText=clueLimit;
document.getElementById("timer").innerText=time;

let ans=document.getElementById("answers");
ans.innerHTML="";

q.a.forEach((opt,i)=>{
let btn=document.createElement("button");
btn.className="btn option";
btn.innerText=opt;
btn.dataset.index=i;

btn.onclick=()=>{
clearInterval(timerInterval);
showAnswer(i, btn);
};

ans.appendChild(btn);
});

startTimer();
}

// TIMER
function startTimer(){
timerInterval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time===0){
clearInterval(timerInterval);
skipQuestion();
}
},1000);
}

// SHOW ANSWER
function showAnswer(selected, btn){
let q=quiz[index];
let buttons=document.querySelectorAll(".option");

buttons.forEach(b=>{
b.disabled=true;
if(parseInt(b.dataset.index)===q.c) b.classList.add("correct");
});

if(selected===q.c){
score++;
}else{
btn.classList.add("wrong");
}

setTimeout(()=>{
index++;
if(index<quiz.length) loadQuestion();
else showResult();
},1000);
}

// SKIP
function skipQuestion(){
index++;
if(index<quiz.length) loadQuestion();
else showResult();
}

// CLUE
function useClue(){
if(clueUsed || clueLimit<=0) return;

let q=quiz[index];
let buttons=document.querySelectorAll(".option");
let wrong=[];

buttons.forEach(btn=>{
if(parseInt(btn.dataset.index)!==q.c) wrong.push(btn);
});

for(let i=0;i<2;i++){
let r=Math.floor(Math.random()*wrong.length);
wrong[r].style.display="none";
wrong.splice(r,1);
}

clueUsed=true;
clueLimit--;
document.getElementById("clueCount").innerText=clueLimit;
}

// RESULT
function showResult(){
let percent = Math.round((score/quiz.length)*100);
let grade = percent>=80?"A":percent>=60?"B":percent>=40?"C":"Fail";

document.getElementById("quiz").innerHTML=
`<h2>Quiz Finished 🎉</h2>
<p>Score: ${score}/${quiz.length}</p>
<p>Percentage: ${percent}%</p>
<p>Grade: ${grade}</p>
<button onclick="location.reload()">Restart</button>`;
}

</script>

</body>
</html>
